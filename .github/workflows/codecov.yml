name: Workflow for Codecov (with Cython coverage)

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage setuptools cython

      # Linux & macOS
      - name: Clean old build files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find . -name "*.so" -delete
          find . -name "*.c" -delete
          rm -rf build/ dist/ *.egg-info
      
      # Windows
      - name: Clean old build files (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Remove-Item -Recurse -Force build,dist,*.egg-info -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter '*.so' | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter '*.c' | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Build Cython extensions
        run: |
          # 开启 Cython linetrace
          export CFLAGS="-O0 -DCYTHON_TRACE=1"
          python setup.py build_ext --inplace

      - name: Install package
        run: |
          pip install -e .

      - name: Run tests and generate coverage
        run: |
          python -m coverage run --source=classix -m pytest unittests.py
          python -m coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true

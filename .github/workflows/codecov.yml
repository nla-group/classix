name: Workflow for Codecov (with Cython coverage)

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] # , windows-latest, macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools cython pytest pytest-cov coverage
          pip install -r requirements.txt

      - name: Clean old build files
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell -Command "Remove-Item -Recurse -Force build,dist,*.egg-info -ErrorAction SilentlyContinue; Get-ChildItem -Recurse -Filter '*.pyd' | Remove-Item -Force -ErrorAction SilentlyContinue; Get-ChildItem -Recurse -Filter '*.c' | Remove-Item -Force -ErrorAction SilentlyContinue"
          else
            find . -name "*.so" -delete
            find . -name "*.c" -delete
            rm -rf build/ dist/ *.egg-info
          fi

      - name: Build Cython extensions
        run: python setup.py build_ext --inplace
        env:
          CFLAGS: -O0 -DCYTHON_TRACE=1

      - name: Install package
        run: pip install -e .

      - name: Run tests and generate coverage
        run: |
          pytest --cov=classix --cov-report=xml:coverage.xml unittests.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

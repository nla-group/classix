name: Workflow for Codecov (with Cython coverage)

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools cython pytest pytest-cov coverage
          pip install -r requirements.txt

      # 4. Clean old build files
      - name: Clean old build files
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell -Command "Remove-Item -Recurse -Force build,dist,*.egg-info -ErrorAction SilentlyContinue; Get-ChildItem -Recurse -Filter '*.pyd' | Remove-Item -Force -ErrorAction SilentlyContinue"
          else
            find . -name "*.so" -delete 2>/dev/null || true
            rm -rf build/ dist/ *.egg-info
          fi

      # 5. Build Cython extensions with linetrace
      - name: Build Cython extensions
        run: python setup.py build_ext --inplace
        env:
          CFLAGS: -O0 -DCYTHON_TRACE=1
        continue-on-error: true  # 允许没有 Cython 的情况继续

      # 6. Install package
      - name: Install package
        run: pip install -e .

      # 7. Run tests and generate coverage
      - name: Run tests and generate coverage
        run: |
          coverage run -m pytest unittests.py -v
          coverage xml -o coverage.xml
          coverage report

      # 8. Display coverage file info (for debugging)
      - name: Display coverage file info
        shell: bash
        run: |
          ls -lh coverage.xml || dir coverage.xml
          head -n 20 coverage.xml || type coverage.xml

      # 9. Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false  # 不让 codecov 失败阻止 CI
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      # 10. Upload coverage HTML report as artifact
      - name: Generate HTML coverage report
        if: always()
        run: coverage html

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

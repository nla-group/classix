name: Workflow for Codecov (with Cython coverage)

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools cython pytest pytest-cov coverage -r requirements.txt

      # 4. Clean old build files (Linux/macOS)
      - name: Clean old build files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find . -name "*.so" -delete
          find . -name "*.c" -delete
          rm -rf build/ dist/ *.egg-info

      # 5. Clean old build files (Windows)
      - name: Clean old build files (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Remove-Item -Recurse -Force build,dist,*.egg-info -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter '*.so' | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter '*.c' | Remove-Item -Force -ErrorAction SilentlyContinue

      # 6. Build Cython extensions with linetrace
      - name: Build Cython extensions
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell -Command "$env:CFLAGS='-O0 -DCYTHON_TRACE=1'; python setup.py build_ext --inplace"
          else
            export CFLAGS="-O0 -DCYTHON_TRACE=1"
            python setup.py build_ext --inplace
          fi

      # 7. Install package
      - name: Install package
        run: |
          pip install -e .

      # 8. Run tests and generate coverage
      - name: Run tests and generate coverage
        run: |
          pytest --cov=classix --cov-report=xml test/

      # 9. Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true

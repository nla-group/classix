codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "60...95"
  
  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
    
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "tests/**/*"
  - "exps/**/*"
  - "demos/**/*"
  - "docs/**/*"
  - "matlab/**/*"
  - "setup.py"
  - "**/__pycache__"
  - "*.pyx"
  - "*.c"
  - "*.cpp"
  - "*.so"
  - "*.pyd"

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: no
